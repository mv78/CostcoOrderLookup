{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Inject Bearer Token</h2>
  <p style="font-size:0.85rem;color:#555;margin-bottom:14px;">
    Copy the <code>costco-x-authorization</code> Bearer token from Chrome DevTools
    (Network tab &rarr; any ecom-api.costco.com request &rarr; Headers).
    Paste everything <strong>after</strong> <code>Bearer </code> below.
  </p>
  <form method="POST" action="/inject-token">
    <label for="token">Bearer Token (eyJ...)</label>
    <textarea id="token" name="token" placeholder="eyJ..." required></textarea>
    <label for="refresh_token" style="margin-top:12px;">
      Refresh Token <span style="font-weight:normal;color:#888;">(optional — enables auto-renewal)</span>
    </label>
    <textarea id="refresh_token" name="refresh_token" placeholder="eyJ... (paste refresh_token for automatic renewal)"></textarea>
    <button type="submit" class="btn btn-primary">Inject Token</button>
  </form>
</div>

<div class="card">
  <h2>Search Orders</h2>
  <form method="GET" action="/search">
    <div class="search-toggle" style="margin-bottom:14px;">
      <label style="display:inline;font-weight:500;margin-right:18px;">
        <input type="radio" name="search_type" value="item" checked onchange="toggleSearchType(this.value)">
        Item Number
      </label>
      <label style="display:inline;font-weight:500;">
        <input type="radio" name="search_type" value="description" onchange="toggleSearchType(this.value)">
        Product Description
      </label>
    </div>
    <div class="form-row">
      <div id="item-input">
        <label for="item">Item Number</label>
        <input type="text" id="item" name="item" placeholder="e.g. 1234567">
      </div>
      <div id="desc-input" style="display:none;">
        <label for="description">Description</label>
        <input type="text" id="description" name="description" placeholder="e.g. kirkland olive oil">
      </div>
      <div style="max-width:160px;">
        <label for="years">Search Years</label>
        <select id="years" name="years">
          <option value="1">1 year</option>
          <option value="2">2 years</option>
          <option value="5" selected>5 years</option>
          <option value="10">10 years</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Search</button>
    </div>
  </form>
  <script>
  function toggleSearchType(value) {
    var itemDiv = document.getElementById('item-input');
    var descDiv = document.getElementById('desc-input');
    if (value === 'item') {
      itemDiv.style.display = '';
      descDiv.style.display = 'none';
      document.getElementById('description').value = '';
    } else {
      itemDiv.style.display = 'none';
      descDiv.style.display = '';
      document.getElementById('item').value = '';
    }
  }
  </script>
</div>

{% endblock %}
